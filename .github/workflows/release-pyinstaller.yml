name: Build Release Executables

on:
  push:
    tags:
      - '[0-9]*'

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            asset_name: jn80-librarian-mac
          - os: windows-latest
            asset_name: jn80-librarian-win.exe
          - os: ubuntu-latest
            asset_name: jn80-librarian-linux

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install pyinstaller
        run: pip install pyinstaller

      - name: Install windows-curses (Windows only)
        if: runner.os == 'Windows'
        run: pip install windows-curses

      - name: Build standalone executable
        run: >
          pyinstaller
          --onefile
          --name jn80-librarian
          --hidden-import=mido.backends.rtmidi
          --collect-submodules mido.backends
          --collect-all rtmidi
          main.py

      - name: Remove legacy uncompressed Unix assets
        if: runner.os == 'Linux'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = context.ref.replace("refs/tags/", "");
            let release;

            try {
              release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            } catch (error) {
              core.info(`No release found for tag ${tag}; skipping legacy cleanup.`);
              return;
            }

            const legacyAssets = new Set(["jn80-librarian-mac", "jn80-librarian-linux"]);
            for (const asset of release.data.assets) {
              if (!legacyAssets.has(asset.name)) {
                continue;
              }

              await github.rest.repos.deleteReleaseAsset({
                owner,
                repo,
                asset_id: asset.id,
              });
              core.info(`Deleted legacy asset: ${asset.name}`);
            }

      - name: Prepare platform artifact filename
        id: prepare_asset
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp dist/jn80-librarian.exe "dist/${{ matrix.asset_name }}"
            {
              echo "upload_files<<EOF"
              echo "dist/${{ matrix.asset_name }}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            cp dist/jn80-librarian "dist/${{ matrix.asset_name }}"
            chmod +x "dist/${{ matrix.asset_name }}"
            tar -czf "dist/${{ matrix.asset_name }}.tar.gz" -C dist "${{ matrix.asset_name }}"
            (
              cd dist
              zip -q "${{ matrix.asset_name }}.zip" "${{ matrix.asset_name }}"
            )
            {
              echo "upload_files<<EOF"
              echo "dist/${{ matrix.asset_name }}.zip"
              echo "dist/${{ matrix.asset_name }}.tar.gz"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Derive release metadata from README changelog
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          notes_file="${RUNNER_TEMP}/release-notes-${tag}.md"

          changelog_section=$(awk -v tag="$tag" '
            $0 ~ "^### " tag " - " { in_section=1; next }
            in_section && $0 ~ "^### " { exit }
            in_section { print }
          ' README.md)

          if [[ -z "${changelog_section}" ]]; then
            {
              echo "No changelog entries found in README.md for this tag."
            } > "${notes_file}"
            release_name="JN-80 Librarian ${tag}"
          else
            notes_body=$(printf '%s\n' "${changelog_section}" | awk 'found || NF { found=1; print }')
            printf '%s\n' "${notes_body}" > "${notes_file}"

            commit_subject=$(git log -1 --pretty=%s)
            if [[ "${commit_subject}" =~ ^Release[[:space:]]+${tag}:[[:space:]]+(.+)$ ]]; then
              release_title="${BASH_REMATCH[1]}"
              release_name="${release_title}"
            else
              first_change=$(printf '%s\n' "${changelog_section}" | sed -n 's/^  - //p' | head -n 1)
              if [[ -z "${first_change}" ]]; then
                first_change=$(printf '%s\n' "${changelog_section}" | sed -n 's/^- //p' | head -n 1)
              fi

              if [[ -n "${first_change}" ]]; then
                # Keep fallback titles readable: strip markdown tokens and trim at word boundary.
                first_change=$(printf '%s' "${first_change}" | sed -E 's/[`*_]+//g; s/\[[^]]+\]\(([^)]+)\)/\1/g')
                first_change=$(printf '%s' "${first_change}" | awk '{$1=$1; print}')
                max_change_len=72
                if (( ${#first_change} > max_change_len )); then
                  trimmed=$(printf '%s' "${first_change:0:max_change_len}" | sed -E 's/[[:space:]][^[:space:]]*$//')
                  if [[ -n "${trimmed}" ]]; then
                    first_change="${trimmed}..."
                  else
                    first_change="${first_change:0:max_change_len}..."
                  fi
                fi
                release_name="${first_change}"
              else
                release_name="JN-80 Librarian"
              fi
            fi
          fi

          # Keep title concise for GitHub release UI.
          release_name="${release_name:0:120}"

          {
            echo "release_name=${release_name}"
            echo "notes_path=${notes_file}"
          } >> "$GITHUB_OUTPUT"

      - name: Upload executable to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release_meta.outputs.release_name }}
          body_path: ${{ steps.release_meta.outputs.notes_path }}
          draft: false
          files: ${{ steps.prepare_asset.outputs.upload_files }}
          fail_on_unmatched_files: true
